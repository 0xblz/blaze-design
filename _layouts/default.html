<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>{{ page.title }} - {{ page.description }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% endif %}">
    <link rel="icon" type="image/jpg" href="{{ site.baseurl }}/assets/images/avatar.jpg">
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css">
    <script src="https://kit.fontawesome.com/a95c2fa36e.js" crossorigin="anonymous"></script>
</head>
<body class="{% if page.custom_class %}{{ page.custom_class }}{% endif %}">
    <main>
        <header>
            <div class="warp">blaze</div>
            <nav>
                <div class="colors">
                    <div class="color color-1 active">
                        <i class="fa-solid fa-moon"></i>
                    </div>
                    <div class="color color-2">
                        <i class="fa-solid fa-sun"></i>
                    </div>
                    <div class="color color-3">
                        <i class="fa-solid fa-user-astronaut"></i>
                    </div>
                </div>
            </nav>
            <nav>
                <a href="https://x.com/0xblz" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://codepen.io/0xblz" target="_blank"><i class="fa-brands fa-codepen"></i></a>
            </nav>
        </header>
        <section>
            {{ content }}
        </section>
    </main>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-355V4GHGSF"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-355V4GHGSF');
    </script>
    
    {% if page.js_file %}
        <script src="/assets/js/{{ page.js_file }}.js"></script>
    {% endif %}

    <script src="/assets/js/select.js"></script>
    <script src="/assets/js/window.js"></script>
    <script src="/assets/js/theme.js"></script>

</body>
</html>
