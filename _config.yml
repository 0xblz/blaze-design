# Site settings
title: "Blaze Pollard"
description: "Product Designer & Creative Technologist"
author: "Blaze Pollard"
url: "https://blaze.design"
baseurl: ""

# Build settings
source: .
destination: ./_site
include: ['.htaccess']
exclude: ['Gemfile', 'Gemfile.lock', 'node_modules', '.git', '.gitignore', 'README.md', '.ruby-version', '.claude']
encoding: utf-8
keep_files: []
permalink: pretty

# Plugins
plugins:
  - jekyll-sitemap

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Markdown
highlighter: rouge
markdown: kramdown

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed